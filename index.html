// ---- Artwork (iTunes Search API - free, no key needed) ----
var artworkCache = {};

function fetchArtwork(title, artist, callback) {
  var cacheKey = title + "|" + (artist || "");
  if (artworkCache[cacheKey]) { callback(artworkCache[cacheKey]); return; }
  var term = encodeURIComponent(title + " " + (artist || ""));
  fetch("https://itunes.apple.com/search?term=" + term + "&country=jp&media=music&limit=1")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var url = null;
      if (d.results && d.results.length > 0 && d.results[0].artworkUrl100) {
        url = d.results[0].artworkUrl100.replace("100x100", "300x300");
      }
      artworkCache[cacheKey] = url;
      callback(url);
    })
    .catch(function() { callback(null); });
}

// ---- API ----
function callClaude(prompt, apiKey) {
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.error) throw new Error(JSON.stringify(d.error));
    return (d.content || []).map(function(b) { return b.text || ""; }).join("");
  });
}

function fetchSongInfo(title, artist, apiKey) {
  var query = artist ? title + " - " + artist : title;
  var prompt = "楽曲「" + query + "」のコード進行・キー・BPM・ジャンルをJSONのみで返してください。マークダウン不要。形式: {\"chords\":\"Am F C G\",\"key\":\"Aマイナー\",\"bpm\":90,\"genre\":\"J-Pop\",\"notes\":\"サビの進行\"}。不明な項目はnullにしてください。";
  return callClaude(prompt, apiKey).then(function(text) {
    var info = { chords: null, key: null, bpm: null, genre: null, notes: null };
    try {
      var bt = String.fromCharCode(96);
      var cleaned = text.replace(new RegExp(bt+bt+bt+"json|"+bt+bt+bt, "g"), "").trim();
      var s = cleaned.indexOf("{"), e = cleaned.lastIndexOf("}");
      if (s !== -1 && e !== -1) Object.assign(info, JSON.parse(cleaned.slice(s, e+1)));
    } catch(e) {}
    return info;
  });
}

function analyzeTheory(song, apiKey) {
  var lines = [
    "以下の楽曲を楽典・音楽理論の観点から詳しく分析してください。",
    "曲名: " + song.title, "アーティスト: " + (song.artist || "不明"),
    "コード進行: " + (song.chords || "不明"), "キー: " + (song.key || "不明"),
    "BPM: " + (song.bpm || "不明"), "ジャンル: " + (song.genre || "不明"), "",
    "以下の観点で分析:",
    "1. キーとスケール", "2. コード機能分析", "3. 特徴的な進行・テクニック",
    "4. 楽典的なポイント", "5. 似た傾向を持つ曲・アーティスト",
    "", "日本語で専門的かつ読みやすく書いてください。",
  ];
  return callClaude(lines.join("\n"), apiKey);
}

// ---- Helpers ----
function parseChords(raw) {
  if (!raw) return [];
  return raw.trim().split(/[\s,|]+/).filter(function(s) { return s && s !== "-"; });
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === "style") { Object.assign(e.style, attrs[k]); }
    else if (k === "className") { e.className = attrs[k]; }
    else if (k.startsWith("on")) { e.addEventListener(k.slice(2).toLowerCase(), attrs[k]); }
    else { e.setAttribute(k, attrs[k]); }
  });
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(function(c) {
      if (c == null) return;
      e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
  }
  return e;
}

function div(attrs, children) { return el("div", attrs, children); }
function btn(attrs, children) { return el("button", attrs, children); }
function span(attrs, children) { return el("span", attrs, children); }

  SAMPLES.forEach(function(s, i) {
    if (s.header) {
      sampleCard.appendChild(div({ style: { fontSize: "11px", fontWeight: "800", color: "#5F27CD", letterSpacing: "2px", margin: "16px 0 8px", paddingBottom: "4px", borderBottom: "2px solid #ede9ff" } }, [s.header]));
      return;
    }
    var data = SONG_DB[s.key];
    if (!data) return;
    var i2 = colorIdx++;
    var color = PALETTE[i2 % PALETTE.length];
    var added = state.songs.find(function(x) { return x.dbKey === s.key; });
    var row = btn({
      className: "sample-btn",
      style: { display: "flex", alignItems: "center", gap: "14px", padding: "14px 16px", background: added ? color + "12" : "#fafafa", border: "1.5px solid " + (added ? color + "44" : "#f0f0f0"), borderRadius: "14px", cursor: "pointer", width: "100%", textAlign: "left", marginBottom: "8px", fontFamily: "Outfit, sans-serif", "--color": color },
      onClick: function() {
        if (added) { state.expandedId = added.id; state.tab = "library"; render(); return; }
        var id = Date.now();
        var song = Object.assign({}, data, { id: id, dbKey: s.key, chordList: parseChords(data.chords), color: color, aiAnalysis: null });
        state.songs.push(song);
        state.expandedId = id;
        state.tab = "library";
        render();
      }
    }, [
      (function() {
        var iconBox = div({ style: { width: "40px", height: "40px", borderRadius: "11px", background: color + "20", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: "0", fontSize: "18px", color: color, overflow: "hidden" } }, ["♪"]);
        fetchArtwork(data.title, data.artist, function(url) {
          if (url) {
            iconBox.innerHTML = "";
            iconBox.appendChild(el("img", { src: url, style: { width: "100%", height: "100%", objectFit: "cover" } }));
          }
        });
        return iconBox;
      })(),
      div({ style: { flex: "1", minWidth: "0" } }, [
        div({ style: { fontSize: "14px", fontWeight: "700", color: "#1a1a2e" } }, [data.title]),
        div({ style: { fontSize: "11px", color: "#bbb", marginTop: "2px" } }, [data.artist || "Standard"]),
      ]),
      div({ style: { display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "3px", flexShrink: "0" } }, [
        span({ style: { background: color + "18", color: color, borderRadius: "7px", padding: "2px 9px", fontSize: "11px", fontWeight: "700" } }, [data.key.split(" ")[0]]),
        added ? span({ style: { fontSize: "10px", color: color, fontWeight: "700" } }, ["追加済"]) : null,
      ].filter(Boolean)),
    ]);
    sampleCard.appendChild(row);
  });

  wrap.appendChild(sampleCard);
  return wrap;
}

function renderLibrary() {
  if (state.songs.length === 0) {
    return div({ style: { background: "#fff", borderRadius: "22px", padding: "56px 20px", textAlign: "center", boxShadow: "0 4px 22px rgba(0,0,0,0.07)" } }, [
      div({ style: { fontSize: "40px", marginBottom: "10px" } }, ["♫"]),
      div({ style: { fontSize: "15px", fontWeight: "700", color: "#ccc", marginBottom: "14px" } }, ["まだ曲がありません"]),
      btn({ style: { background: "linear-gradient(135deg,#5F27CD,#FF6B81)", border: "none", borderRadius: "12px", padding: "11px 22px", fontFamily: "Outfit, sans-serif", fontWeight: "700", fontSize: "13px", color: "#fff", cursor: "pointer" }, onClick: function() { state.tab = "add"; render(); } }, ["+ 曲を選ぶ"]),
    ]);
  }

  var list = div({ style: { display: "flex", flexDirection: "column", gap: "10px" } });
  state.songs.forEach(function(song) {
    list.appendChild(renderSongCard(song));
  });
  return list;
}

function renderSongCard(song) {
  var open = state.expandedId === song.id;
  var card = div({ style: { background: "#fff", borderRadius: "18px", overflow: "hidden", boxShadow: "0 2px 12px rgba(0,0,0,0.07)" }, className: "pop" });

  var header = div({
    className: "song-row",
    style: { display: "flex", alignItems: "center", gap: "13px", padding: "15px 18px", cursor: "pointer", transition: "background 0.15s" },
    onClick: function() { state.expandedId = open ? null : song.id; render(); }
  }, [
    (function() {
      var iconBox = div({ style: { width: "40px", height: "40px", borderRadius: "11px", background: song.color + "20", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: "0", fontSize: "18px", color: song.color, overflow: "hidden" } }, ["♪"]);
      fetchArtwork(song.title, song.artist, function(url) {
        if (url) {
          iconBox.innerHTML = "";
          iconBox.appendChild(el("img", { src: url, style: { width: "100%", height: "100%", objectFit: "cover" } }));
        }
      });
      return iconBox;
    })(),
    div({ style: { flex: "1", minWidth: "0" } }, [
      div({ style: { fontSize: "14px", fontWeight: "700", color: "#1a1a2e", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, [song.title]),
      div({ style: { fontSize: "11px", color: "#bbb", marginTop: "2px" } }, [song.artist || "Standard"]),
    ]),
    div({ style: { display: "flex", gap: "5px", flexShrink: "0" } }, [
      song.key ? badge(song.key.split(" ")[0], song.color) : null,
      song.bpm ? span({ style: { background: "#f5f5f5", color: "#bbb", borderRadius: "7px", padding: "3px 9px", fontSize: "11px" } }, [song.bpm + "BPM"]) : null,
    ].filter(Boolean)),
    btn({
      style: { background: "none", border: "none", color: "#e0e0e0", cursor: "pointer", fontSize: "16px", padding: "2px 5px", lineHeight: "1", flexShrink: "0" },
      onClick: function(e) {
        e.stopPropagation();
        state.songs = state.songs.filter(function(s) { return s.id !== song.id; });
        if (state.expandedId === song.id) state.expandedId = null;
        render();
      }
    }, ["x"]),
    span({ style: { color: "#ccc", fontSize: "11px", flexShrink: "0" } }, [open ? "v" : ">"]),
  ]);
  card.appendChild(header);

  if (open) {
    var body = div({ style: { padding: "0 18px 18px" } });
    body.appendChild(div({ style: { height: "1px", background: "#f5f5f5", marginBottom: "14px" } }));

    if (song.chordList && song.chordList.length > 0) {
      var chordWrap = div({ style: { marginBottom: "14px" } }, [
        div({ style: { fontSize: "9px", fontWeight: "700", color: "#ddd", letterSpacing: "2px", marginBottom: "9px" } }, ["CHORD PROGRESSION"]),
        div({ style: { display: "flex", flexWrap: "wrap", gap: "7px" } },
          song.chordList.map(function(ch) {
            return span({ style: { background: song.color + "14", border: "1.5px solid " + song.color + "38", borderRadius: "9px", padding: "6px 12px", fontSize: "14px", fontWeight: "700", color: song.color } }, [ch]);
          })
        )
      ]);
      body.appendChild(chordWrap);
    }

    var tags = div({ style: { display: "flex", gap: "7px", flexWrap: "wrap", marginBottom: "14px" } });
    if (song.genre) tags.appendChild(span({ style: { background: "#f5f5f5", borderRadius: "7px", padding: "4px 11px", fontSize: "11px", color: "#999", fontWeight: "600" } }, [song.genre]));
    if (song.key) tags.appendChild(span({ style: { background: "#f5f5f5", borderRadius: "7px", padding: "4px 11px", fontSize: "11px", color: "#999", fontWeight: "600" } }, [song.key]));
    if (song.notes) tags.appendChild(span({ style: { background: "#fffbf0", borderRadius: "7px", padding: "4px 11px", fontSize: "11px", color: "#cc9900", fontWeight: "600" } }, [song.notes]));
    body.appendChild(tags);

    // Analysis button
    var analysisDiv = div({ style: { marginTop: "12px", background: "#fafafa", borderRadius: "12px", padding: "16px", display: "none" } });

    if (song.analysis) {
      song.analysis.forEach(function(item) {
        analysisDiv.appendChild(div({ style: { marginBottom: "12px" } }, [
          div({ style: { fontSize: "12px", fontWeight: "800", color: song.color, marginBottom: "4px" } }, [item.heading]),
          div({ style: { fontSize: "12px", lineHeight: "1.85", color: "#555" } }, [item.body]),
        ]));
      });
      analysisDiv.style.display = "block";
    } else if (song.aiAnalysis) {
      var lines = song.aiAnalysis.split("\n");
      lines.forEach(function(line) {
        if (!line.trim()) return;
        var isHeading = /^\d+\.\s.{1,30}$/.test(line.trim());
        analysisDiv.appendChild(div({ style: { fontSize: isHeading ? "13px" : "12px", fontWeight: isHeading ? "800" : "400", color: isHeading ? song.color : "#555", marginTop: isHeading ? "14px" : "0", lineHeight: "1.85" } }, [line]));
      });
      analysisDiv.style.display = "block";
    }

    var analysisBtn = btn({
      style: { width: "100%", padding: "12px", border: "none", borderRadius: "12px", fontFamily: "Outfit, sans-serif", fontWeight: "700", fontSize: "14px", cursor: "pointer", background: song.color + "16", color: song.color },
      onClick: function() {
        if (song.analysis || song.aiAnalysis) {
          analysisDiv.style.display = analysisDiv.style.display === "none" ? "block" : "none";
          analysisBtn.textContent = analysisDiv.style.display === "none" ? "楽典・理論分析を見る" : "閉じる";
          return;
        }
        if (!state.apiKey) { alert("AI分析にはAPIキーが必要です。ページ上部に入力してください。"); return; }
        analysisBtn.textContent = "分析中...";
        analysisBtn.disabled = true;
        analyzeTheory(song, state.apiKey).then(function(text) {
          song.aiAnalysis = text;
          var lines2 = text.split("\n");
          lines2.forEach(function(line) {
            if (!line.trim()) return;
            var isH = /^\d+\.\s.{1,30}$/.test(line.trim());
            analysisDiv.appendChild(div({ style: { fontSize: isH ? "13px" : "12px", fontWeight: isH ? "800" : "400", color: isH ? song.color : "#555", marginTop: isH ? "14px" : "0", lineHeight: "1.85" } }, [line]));
          });
          analysisDiv.style.display = "block";
          analysisBtn.textContent = "閉じる";
          analysisBtn.disabled = false;
        }).catch(function(e) {
          analysisBtn.textContent = "エラー: " + e.message.slice(0, 40);
          analysisBtn.disabled = false;
        });
      }
    }, ["楽典・理論分析を見る"]);

    body.appendChild(analysisBtn);
    body.appendChild(analysisDiv);
    card.appendChild(body);
  }
  return card;
}

function renderTrend() {
  var wrap = div({ style: { display: "flex", flexDirection: "column", gap: "13px" } });

  var listCard = div({ style: { background: "#fff", borderRadius: "22px", padding: "20px", boxShadow: "0 4px 22px rgba(0,0,0,0.07)" } }, [
    div({ style: { fontSize: "15px", fontWeight: "800", color: "#1a1a2e", marginBottom: "12px" } }, ["登録中の曲"]),
  ]);
  state.songs.forEach(function(s) {
    listCard.appendChild(div({ style: { display: "flex", alignItems: "center", gap: "10px", padding: "9px 13px", background: "#fafafa", borderRadius: "11px", marginBottom: "7px" } }, [
      div({ style: { width: "7px", height: "7px", borderRadius: "50%", background: s.color, flexShrink: "0" } }),
      div({ style: { flex: "1" } }, [
        span({ style: { fontWeight: "700", fontSize: "13px", color: "#1a1a2e" } }, [s.title]),
        span({ style: { fontSize: "11px", color: "#bbb", marginLeft: "7px" } }, [s.artist || ""]),
      ]),
      s.key ? span({ style: { fontSize: "11px", fontWeight: "700", color: s.color } }, [s.key.split(" ")[0]]) : null,
    ].filter(Boolean)));
  });
  wrap.appendChild(listCard);

  var minorCount = state.songs.filter(function(s) { return s.key && (s.key.indexOf("マイナー") !== -1 || (s.key.split(" ")[0] || "").endsWith("m")); }).length;
  var majorCount = state.songs.length - minorCount;
  var genres = {}; state.songs.forEach(function(s) { if (s.genre) genres[s.genre] = (genres[s.genre] || 0) + 1; });
  var topGenre = Object.entries(genres).sort(function(a,b){return b[1]-a[1];})[0];
  var avgBpm = Math.round(state.songs.reduce(function(a,s){return a+(s.bpm||100);},0)/state.songs.length);

  var statsCard = div({ style: { background: "#fff", borderRadius: "22px", padding: "22px", boxShadow: "0 4px 22px rgba(0,0,0,0.07)" } }, [
    div({ style: { fontSize: "15px", fontWeight: "800", color: "#5F27CD", marginBottom: "16px" } }, ["統計サマリー"]),
    div({ style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "16px" } },
      [
        ["メジャー", majorCount + "曲", "#54A0FF"],
        ["マイナー", minorCount + "曲", "#FF6B81"],
        ["平均BPM", String(avgBpm), "#FF9F43"],
        ["人気ジャンル", topGenre ? topGenre[0] : "-", "#1DD1A1"],
      ].map(function(item) {
        return div({ style: { background: item[2] + "12", borderRadius: "12px", padding: "12px 14px" } }, [
          div({ style: { fontSize: "10px", color: item[2], fontWeight: "700", letterSpacing: "1px", marginBottom: "4px" } }, [item[0]]),
          div({ style: { fontSize: "20px", fontWeight: "800", color: item[2] } }, [item[1]]),
        ]);
      })
    ),
    div({ style: { background: "#fafafa", borderRadius: "14px", padding: "16px" } }, [
      div({ style: { fontSize: "12px", fontWeight: "800", color: "#5F27CD", marginBottom: "8px" } }, ["傾向コメント"]),
      div({ style: { fontSize: "12px", lineHeight: "1.85", color: "#555" } }, [
        minorCount > majorCount ? "マイナー系の曲が多く、内省的・感情的な音楽を好む傾向があります。" :
        majorCount > minorCount ? "メジャー系の曲が多く、明るく前向きな音楽を好む傾向があります。" :
        "メジャー・マイナーをバランスよく好む傾向があります。"
      ]),
    ]),
  ]);
  wrap.appendChild(statsCard);
  return wrap;
}

render();
</script>
</body>
</html>
